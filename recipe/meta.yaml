{% set name = "spec-kit" %}
{% set version = "0.9.2" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/github/spec-kit/archive/v{{ version }}.tar.gz
  sha256: 99e25c42a2a2b8a90995c223f213961effb2b64a375e5a602b3d81c62b442494

build:
  entry_points:
    - specify = specify_cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  script_env:
    - PYTHONIOENCODING=utf8
    - PYTHONUTF8=1
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - json5 >=0.13.0
    - pathspec >=0.12.0
    - click >=8.2.1
    - python >={{ python_min }},<4.0
    - typer >=0.24.0
    - rich
    - httpx
    # https://github.com/encode/httpx/blob/master/pyproject.toml#L51
    - socksio ==1
    - platformdirs
    - readchar
    - truststore >=0.10.4
    - pyyaml >=6.0
    - packaging >=23.0

test:
  imports:
    - specify_cli
  commands:
    - specify --help
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Specify CLI, part of GitHub Spec Kit. A tool to bootstrap your projects for Spec-Driven Development (SDD).
  license: MIT
  license_file: LICENSE
  home: https://github.com/github/spec-kit

extra:
  recipe-maintainers:
    - rxm7706
